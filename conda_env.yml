name: mrn
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pytorch=1.4.0
  - cudatoolkit=10.1
  - absl-py
  - pyparsing
  - bazel
  - box2d-py=2.3.5  # Pre-compiled C++ physics engine
  - pip
  - pip:
    - termcolor
    - tb-nightly
    - imageio
    - imageio-ffmpeg
    - git+https://github.com/facebookresearch/hydra@0.11_branch
    - matplotlib
    - glfw==1.11.2
    - scikit-image
    - gymnasium[box2d]
    - tensorboard
    - tqdm
    - scipy
    - future
    - h5py